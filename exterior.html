<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Area Exterior - Arena Fitness Tulum</title>
<style>
:root{--brown:#2a1e10;--taupe:#6b5f52;--taupe-l:#a09488;--cement:#e4e4d8;--green:#4a6a30;--green-l:#6a8a50;--beige:#d8c8aa;--beige-l:#ece0cc;--beige-xl:#f5f0e8;--white:#faf8f4;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--beige-xl);font-family:Verdana,sans-serif;color:var(--brown);}
nav{position:fixed;top:0;left:0;right:0;height:72px;background:rgba(245,240,232,0.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--cement);display:flex;align-items:center;justify-content:space-between;padding:0 48px;z-index:99;}
.nav-logo{text-decoration:none;display:flex;align-items:center;gap:8px;}
.nav-arena{font-size:13px;letter-spacing:8px;color:#c0b4a4;text-transform:uppercase;padding-left:8px;}
.nav-sub{font-size:6px;letter-spacing:3px;color:#9a8e82;text-transform:uppercase;margin-top:3px;}
.nav-back{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--taupe);text-decoration:none;border:1px solid var(--cement);padding:7px 16px;}
.wrap{max-width:860px;margin:100px auto 60px;background:var(--white);border:1px solid var(--cement);}
.head{padding:28px 36px;border-bottom:1px solid var(--cement);display:flex;justify-content:space-between;align-items:flex-start;}
.area-name{font-size:14px;letter-spacing:5px;text-transform:uppercase;color:var(--brown);margin-bottom:6px;}
.area-desc{font-size:10px;color:var(--taupe-l);letter-spacing:1px;}
.price{font-size:36px;color:var(--green);}
.price-sub{font-size:11px;color:var(--taupe-l);letter-spacing:1px;}
.body{padding:28px 36px;}
.lbl{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--taupe-l);margin-bottom:10px;margin-top:20px;display:block;}
.lbl:first-child{margin-top:0;}
.week-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.week-lbl{font-size:16px;color:var(--brown);}
.btn-wk{background:transparent;border:1px solid var(--cement);padding:6px 16px;cursor:pointer;font-family:Verdana,sans-serif;font-size:14px;color:var(--taupe);}
.legend{display:flex;gap:14px;margin-bottom:14px;flex-wrap:wrap;}
.leg{display:flex;align-items:center;gap:6px;font-size:9px;color:var(--taupe-l);}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
table{width:100%;border-collapse:collapse;margin-bottom:20px;font-size:9px;}
th{background:var(--brown);color:var(--beige-l);padding:9px 2px;text-align:center;font-size:8px;letter-spacing:1px;text-transform:uppercase;font-weight:normal;}
th:first-child{width:44px;}
td{border:1px solid var(--cement);text-align:center;height:28px;}
td.hr{background:var(--white);text-align:right;padding-right:6px;color:var(--taupe-l);font-size:8px;}
td.av{background:var(--white);cursor:pointer;}
td.av:hover{background:#e8f4e0;}
td.av.sel{background:#c8d8b0;}
td.bk{background:#ece8e0;cursor:default;}
.mth-row{display:flex;margin-bottom:18px;}
.mth{flex:1;padding:11px 2px;border:1px solid var(--cement);text-align:center;cursor:pointer;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--taupe-l);background:var(--white);font-family:Verdana,sans-serif;}
.mth.on{background:var(--brown);color:var(--beige-l);border-color:var(--brown);}
.pct-box{display:none;margin-bottom:16px;}
.pct-in{width:100%;max-width:300px;border:1px solid var(--cement);padding:10px 12px;font-size:14px;color:var(--brown);font-family:Verdana,sans-serif;outline:none;}
.pct-res{display:none;padding:10px 12px;background:var(--beige-xl);font-size:11px;color:var(--taupe);max-width:300px;margin-top:8px;}
.sum{background:var(--brown);padding:16px 36px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;}
.sum-info{font-size:10px;color:var(--beige-l);letter-spacing:1px;}
.sum-total{font-size:24px;color:var(--beige);}
.btn-book{background:var(--green);color:var(--white);border:none;padding:12px 28px;font-size:10px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;font-family:Verdana,sans-serif;}
.btn-book:disabled{background:#b4b4a4;cursor:default;}
.conf{display:none;padding:22px 36px;background:#c8d8b0;border-top:1px solid #a0c080;text-align:center;}
.conf.show{display:block;}
.conf-ttl{font-size:18px;letter-spacing:3px;text-transform:uppercase;color:var(--brown);margin-bottom:8px;}
.conf-det{font-size:10px;color:var(--taupe);line-height:1.9;}
.btn-reset{margin-top:10px;background:var(--brown);color:var(--beige-l);border:none;padding:8px 18px;cursor:pointer;font-size:8px;letter-spacing:2px;text-transform:uppercase;font-family:Verdana,sans-serif;}
@media(max-width:700px){nav{padding:0 20px;}.wrap{margin:90px 12px 40px;}.head,.body,.sum,.conf{padding-left:20px;padding-right:20px;}}
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">
    <svg width="36" height="36" viewBox="15 15 170 170" fill="none">
      <path d="M 100 170 A 70 70 0 0 1 65 39.4" stroke="#c0b4a4" stroke-width="16" stroke-linecap="round" fill="none"/>
      <circle cx="100" cy="30" r="8" fill="#c0b4a4"/>
      <circle cx="125.6" cy="34.8" r="8" fill="#c0b4a4"/>
      <circle cx="147.6" cy="48.7" r="8" fill="#c0b4a4"/>
      <circle cx="163.1" cy="69.6" r="8" fill="#c0b4a4"/>
      <circle cx="169.8" cy="94.8" r="8" fill="#c0b4a4"/>
      <circle cx="166.9" cy="120.6" r="8" fill="#c0b4a4"/>
      <circle cx="154.7" cy="143.6" r="8" fill="#c0b4a4"/>
      <circle cx="135" cy="160.6" r="8" fill="#c0b4a4"/>
    </svg>
    <div style="display:flex;flex-direction:column;gap:2px;">
      <span class="nav-arena">ARENA</span>
      <span class="nav-sub">FITNESS TULUM</span>
    </div>
  </a>
  <a class="nav-back" href="coaches.html">&#8592; Back</a>
</nav>

<div class="wrap">
  <div class="head">
    <div>
      <div class="area-name">Area Exterior</div>
      <div class="area-desc">Circular floor &middot; Zapote pillars &middot; Palapa roof</div>
    </div>
    <div style="text-align:right;">
      <div class="price">$350</div>
      <div class="price-sub">MXN / hr</div>
    </div>
  </div>

  <div class="body">
    <div class="legend">
      <div class="leg"><div class="leg-dot" style="background:#8a6a20;"></div>Tone in Tulum (Tony)</div>
      <div class="leg"><div class="leg-dot" style="background:#e4e4d8;border:1px solid #b4b4a4;"></div>Reserved</div>
      <div class="leg"><div class="leg-dot" style="background:#c8d8b0;"></div>Selected</div>
    </div>

    <div class="week-nav">
      <button class="btn-wk" id="btnPrev">&#8592;</button>
      <div class="week-lbl" id="wkLbl">-</div>
      <button class="btn-wk" id="btnNext">&#8594;</button>
    </div>

    <table>
      <thead>
        <tr id="calHead"><th></th></tr>
      </thead>
      <tbody id="calBody"></tbody>
    </table>

    <span class="lbl">Payment method</span>
    <div class="mth-row">
      <div class="mth on" id="m0">$350 / hr</div>
      <div class="mth" id="m1">40% Arena</div>
      <div class="mth" id="m2">Private $100</div>
    </div>

    <div class="pct-box" id="pctBox">
      <span class="lbl" style="margin-top:0;">Total generated in class (MXN)</span>
      <input type="number" class="pct-in" id="pctIn" placeholder="e.g. 2400">
      <div class="pct-res" id="pctRes">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px;"><span>Your part (60%)</span><span id="pctCoach">-</span></div>
        <div style="display:flex;justify-content:space-between;border-top:1px solid var(--cement);padding-top:4px;"><span>Arena (40%)</span><span id="pctArena" style="color:var(--green);">-</span></div>
      </div>
    </div>
  </div>

  <div class="sum">
    <div class="sum-info" id="sInfo">Select your hours</div>
    <div style="display:flex;align-items:center;gap:14px;">
      <div class="sum-total" id="sTotal"></div>
      <button class="btn-book" id="btnBook" disabled>Book Now</button>
    </div>
  </div>

  <div class="conf" id="conf">
    <div class="conf-ttl">Booking Confirmed</div>
    <div class="conf-det" id="confDet"></div>
    <button class="btn-reset" id="btnReset">New booking</button>
  </div>
</div>

<script>
var MO = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var DA = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var HR = ['7:00','8:00','9:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00'];
var BL = [
  [1,1,2,'#8a6a20'],[3,1,2,'#8a6a20'],[5,1,2,'#8a6a20']
];
var off=0, sel={}, mth=0;

function mon(o){
  var d=new Date(); var dy=d.getDay(); var df=dy===0?-6:1-dy;
  d.setDate(d.getDate()+df+o*7); d.setHours(0,0,0,0); return d;
}
function dates(){
  var m=mon(off),r=[];
  for(var i=0;i<7;i++){var d=new Date(m);d.setDate(m.getDate()+i);r.push(d);}
  return r;
}
function blk(dow,hi){
  for(var i=0;i<BL.length;i++){if(BL[i][0]===dow&&hi>=BL[i][1]&&hi<BL[i][2])return BL[i][3];}
  return null;
}
function key(d,hi){return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate()+'_'+hi;}
function count(){var n=0;for(var k in sel){if(sel[k])n++;}return n;}

function build(){
  var ds=dates();
  var f=ds[0],l=ds[6];
  document.getElementById('wkLbl').textContent=f.getDate()+' '+MO[f.getMonth()].slice(0,3)+' - '+l.getDate()+' '+MO[l.getMonth()].slice(0,3);
  var head=document.getElementById('calHead');
  head.innerHTML='<th></th>';
  for(var i=0;i<7;i++){var th=document.createElement('th');th.textContent=DA[ds[i].getDay()]+' '+ds[i].getDate();head.appendChild(th);}
  var body=document.getElementById('calBody');
  body.innerHTML='';
  for(var hi=0;hi<HR.length;hi++){
    var tr=document.createElement('tr');
    var th=document.createElement('td');th.className='hr';th.textContent=HR[hi];tr.appendChild(th);
    for(var di=0;di<7;di++){
      var td=document.createElement('td');
      var c=blk(ds[di].getDay(),hi);
      if(c){td.className='bk';td.style.borderBottom='3px solid '+c;}
      else{
        var k=key(ds[di],hi);
        td.className='av'+(sel[k]?' sel':'');
        (function(kk,cell){
          cell.onclick=function(){
            if(sel[kk]){delete sel[kk];cell.className='av';}
            else{sel[kk]=true;cell.className='av sel';}
            upd();
          };
        })(k,td);
      }
      tr.appendChild(td);
    }
    body.appendChild(tr);
  }
}

function upd(){
  var n=count(),btn=document.getElementById('btnBook');
  var info=document.getElementById('sInfo'),tot=document.getElementById('sTotal');
  if(mth===0){var t=n*350;info.textContent=n>0?n+' hour'+(n>1?'s':'')+' selected':'Select your hours';tot.textContent=n>0?'$'+t.toLocaleString()+' MXN':'';btn.disabled=n===0;}
  else if(mth===2){var t=n*100;info.textContent=n>0?n+' hr - private':'Select your hours';tot.textContent=n>0?'$'+t.toLocaleString()+' MXN':'';btn.disabled=n===0;}
  else{var p=parseFloat(document.getElementById('pctIn').value)||0;info.textContent=p>0?'Percentage ready':'Enter class total';tot.textContent=p>0?'$'+(p*.4).toLocaleString()+' MXN':'';btn.disabled=p===0;}
}

document.getElementById('btnPrev').onclick=function(){off--;build();};
document.getElementById('btnNext').onclick=function(){off++;build();};

document.getElementById('m0').onclick=function(){mth=0;setM();};
document.getElementById('m1').onclick=function(){mth=1;setM();};
document.getElementById('m2').onclick=function(){mth=2;setM();};
function setM(){
  for(var i=0;i<3;i++)document.getElementById('m'+i).className='mth'+(i===mth?' on':'');
  document.getElementById('pctBox').style.display=mth===1?'block':'none';
  upd();
}

document.getElementById('pctIn').oninput=function(){
  var t=parseFloat(this.value)||0,res=document.getElementById('pctRes');
  if(t>0){res.style.display='block';document.getElementById('pctCoach').textContent='$'+(t*.6).toLocaleString()+' MXN';document.getElementById('pctArena').textContent='$'+(t*.4).toLocaleString()+' MXN';}
  else{res.style.display='none';}
  upd();
};

document.getElementById('btnBook').onclick=function(){
  var n=count(),det='';
  if(mth===0)det='Area Exterior - '+n+' hour'+(n>1?'s':'')+' - $'+(n*350).toLocaleString()+' MXN';
  else if(mth===2)det='Area Exterior - Private - '+n+' hr - $'+(n*100).toLocaleString()+' MXN';
  else{var p=parseFloat(document.getElementById('pctIn').value)||0;det='Area Exterior - Arena receives $'+(p*.4).toLocaleString()+' MXN';}
  document.getElementById('confDet').textContent=det;
  document.getElementById('conf').className='conf show';
  document.getElementById('btnBook').disabled=true;
  sel={};build();
};

document.getElementById('btnReset').onclick=function(){
  document.getElementById('conf').className='conf';
  sel={};build();upd();
};

build();
</script>
</body>
</html>
